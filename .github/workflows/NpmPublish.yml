name: publish

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: check version, and release
    runs-on: macos-latest
    steps:
    - name: checkout
      uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
      with:
        version: 10.30.1
    - name: setup Node
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: pnpm
        registry-url: 'https://registry.npmjs.org'
    - name: Install Packages
      run: pnpm install --frozen-lockfile
    - name: Build
      run: pnpm run build:ci
    - name: test
      run: pnpm test
    - name: release
      run: |+
        pnpm run echo:v
        cp ./README.md ./packages/cheetah-grid/README.md
        cp ./LICENSE ./packages/cheetah-grid/LICENSE
        cp ./LICENSE ./packages/vue-cheetah-grid/LICENSE
        cp ./LICENSE ./packages/cheetah-grid-icon-svg-loader/LICENSE
        cp ./LICENSE ./packages/unplugin-cheetah-grid-icon-svg/LICENSE
        pnpm run publish:all
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    - uses: peter-evans/create-pull-request@v7
      with:
        commit-message: post-release updates
        branch: post-release
        branch-suffix: timestamp
        title: post-release updates
        base: master
